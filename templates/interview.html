{% extends "base.html" %}

{% block content %}
<div class="header">
    <h2>Topic: {{ topic }}</h2>
    <p>Question {{ current }} of {{ total }}</p>
</div>

<div class="progress-bar">
    <div class="progress-fill" style="width: {{ (current - 1) / total * 100 }}%;"></div>
</div>

<div class="form-group">
    <h3>{{ question }}</h3>
</div>

<form action="{{ url_for('interview') }}" method="POST">
    <div class="form-group">
        <textarea id="answer" name="answer" rows="6" placeholder="Type your answer here..." required></textarea>
    </div>
    
    <button type="submit">Submit Answer & Continue</button>
</form>
{% endblock %}
