{% extends "base.html" %}

{% block content %}
<div class="header">
    <h1>AI Interviewer</h1>
    <p>Run a short structured interview on any topic, then review AI feedback and key themes.</p>
</div>

<form action="{{ url_for('index') }}" method="POST">
    <div class="form-group">
        <label for="topic">What topic would you like to be interviewed on?</label>
        <input type="text" id="topic" name="topic" placeholder="e.g. System Design, React.js, Project Management" required>
    </div>

    <p style="margin-top: -8px; color: #334155; font-size: 14px;">
        You can enter any topic. The interviewer will generate 3-5 progressive questions.
    </p>
    
    <button type="submit">Start Interview</button>
</form>
{% endblock %}
