<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>{% block title %}AI Interviewer{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <nav class="top-bar">
            <a href="{{ url_for('index') }}" class="top-bar-logo">AI Interviewer</a>
            <span class="top-bar-sep">/</span>
            <span class="top-bar-label">{% block nav_label %}Home{% endblock %}</span>
        </nav>

        <div class="container {% block container_class %}{% endblock %}">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for message in messages %}
                            {{ message }}{% if not loop.last %}<br>{% endif %}
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
    document.querySelectorAll('form').forEach(function(form) {
        form.addEventListener('submit', function() {
            var btn = form.querySelector('.btn--primary');
            if (btn && !btn.disabled) {
                btn.disabled = true;
                btn.style.opacity = '0.6';
                btn.textContent = 'Processing\u2026';
            }
        });
    });
    </script>
</body>
</html>
