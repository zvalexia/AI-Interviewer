services:
  ai-interviewer:
    build: .
    container_name: ai-interviewer
    ports:
      - "5001:5001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-12345}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
